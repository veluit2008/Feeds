// INDEXEDDB PERSISTENCE LAYER
// DB name: Cattle_db  |  version: 1
// Stores: sales, purchases, customers, payments, expenses, products, units
// ═══════════════════════════════════════════════════════════════════════════
const DB_NAME = "Cattle_db";
const DB_VERSION = 1;
const DB_STORES = ["sales", "purchases", "customers", "payments", "expenses", "products", "units"];
function openDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onupgradeneeded = (e) => {
            const db = e.target.result;
            DB_STORES.forEach(store => {
                if (!db.objectStoreNames.contains(store)) {
                    db.createObjectStore(store, { keyPath: "id" });
                }
            });
        };
        req.onsuccess = (e) => resolve(e.target.result);
        req.onerror = (e) => reject(e.target.error);
    });
}
// Read all records from a store
function dbGetAll(db, store) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, "readonly");
        const req = tx.objectStore(store).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
    });
}
// Overwrite a store with a fresh array (clear + bulk put)
function dbSaveAll(db, store, items) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction(store, "readwrite");
        const os = tx.objectStore(store);
        const clearReq = os.clear();
        clearReq.onsuccess = () => {
            items.forEach(item => os.put(item));
            tx.oncomplete = resolve;
            tx.onerror = () => reject(tx.error);
        };
        clearReq.onerror = () => reject(clearReq.error);
    });
}

    padding: 20px;
  }

  .alert-info { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
  
  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  
  /* SUMMARY ROW */
  .summary-row { display: flex; gap: 16px; padding: 12px 16px; background: #fafaf9; border-top: 1px solid var(--border); font-size: 13px; }
  .summary-row strong { font-weight: 600; }
  
  /* PROFIT */
  .profit-positive { color: var(--green); font-weight: 600; }
  .profit-negative { color: var(--red); font-weight: 600; }

  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 999px; }
